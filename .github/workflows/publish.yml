name: Publish to npm

on:
  push:
    branches:
      - main

jobs:
  test-and-publish:
    name: Test and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read

    defaults:
      run:
        working-directory: myaider

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
